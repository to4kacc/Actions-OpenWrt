name: Build_imm_HLK_7628N

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: ' ← 选择是否开启 SSH 调试专业人员使用'
        required: false
        default: false
        type: boolean
      log_switch:
        description: " ← 单线程编译 默认4线程"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: 'config/hlk7628n.config'
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-18.06
  FEEDS_CONF: feeds.conf.default
  DIY_P3_SH: diy-part3.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Show hardware info
      run: |
        chmod 755 ./scripts/show_hardware_info.sh
        ./scripts/show_hardware_info.sh

    - name: Free Disk Space (Ubuntu)
      uses: insightsengineering/disk-space-reclaimer@v1.1.2
      with:
        android: false
        dotnet: false
        haskell: false
        large-packages: false
        swap-storage: false
        docker-images: false
        tools-cache: true

    - name: space usage check
      run: df -H

    - name: mkbootimg build
      run: |
        wget https://github.com/xuxin1955/depend_ubuntu2204_openwrt/releases/download/ubuntu_26.04_LTS_mkbootimg/mkbootimg_34.0.5-12build1_all.deb
        sudo dpkg -i mkbootimg_34.0.5-12build1_all.deb || sudo apt-get install -f -y
        mkbootimg --help || true
        sudo timedatectl set-timezone "${TZ}"

    - name: Clone source code
      id: codes
      run: |
        git clone "$REPO_URL" -b "$REPO_BRANCH" openwrt
        cd openwrt
        git pull origin "$REPO_BRANCH"
        git log --oneline -1
        cd ..
        echo "status=success" >> "$GITHUB_OUTPUT"

    - name: Free up disk space
      run: |
        sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir}
        sudo chown -R $USER:$GROUPS /mnt/openwrt
        ln -sfn /mnt/openwrt/dl openwrt/dl
        ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
        ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
        df -H

    - name: feeds DIY_P3_SH
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P3_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P3_SH

    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a -f

    - name: remove warning
      run: |
        chmod 755 $GITHUB_WORKSPACE/scripts/diy-part.sh
        $GITHUB_WORKSPACE/scripts/diy-part.sh

    - name: Configuration Customization
      run: |
        cp -fv "${CONFIG_FILE}" openwrt/.config
        cd openwrt && make defconfig

    # ✅ 只在编译阶段用 18.04 容器
    - name: Compile the OpenWrt (Ubuntu 18.04)
      id: compile
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace/openwrt \
          ubuntu:18.04 \
          bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y \
              build-essential libncurses5-dev gawk git libssl-dev \
              gettext zlib1g-dev swig unzip python3 python3-pip

            make defconfig
            if make -j\$(nproc); then
              echo Compile success
            else
              echo Compile failed, retry with debug log...
              make -j4 V=s
            fi

            grep '^CONFIG_TARGET.*DEVICE.*=y' .config \
              | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          "

        echo "status=success" >> $GITHUB_OUTPUT

    - name: 自动上传最新源码生成.config编译配置
      uses: actions/upload-artifact@v4
      with:
        name: build-config
        path: |
          ${{ github.workspace }}/openwrt/.config
          ${{ github.workspace }}/openwrt/feeds.conf.default
        include-hidden-files: true

    - name: Upload firmware directory
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_firmware
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "🚀 OpenWrt firmware for HILINK HLK-7628N WIFI路由模块" >> release.txt
        echo "设备: HILINK HLK-7628N WIFI路由模块" >> release.txt
        echo "时间: $(date +"%Y-%m-%d %H:%M")" >> release.txt
        echo "源码仓库: ${{ env.REPO_URL }}" >> release.txt
        echo "分支: ${{ env.REPO_BRANCH }}" >> release.txt
        echo "管理地址: 192.168.100.1" >> release.txt
        echo "登录账号: root" >> release.txt
        echo "密码: 无" >> release.txt

    - name: Upload firmware to release
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag: ${{ steps.tag.outputs.release_tag }}
        bodyFile: release.txt
        artifacts: ${{ env.FIRMWARE }}/**/*
        allowUpdates: true
        draft: false
        prerelease: false
